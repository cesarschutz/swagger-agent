spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2048
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
app:
  card-account-api:
    base-url: "http://localhost:3000/"
    get-card-by-uuid: "/cards/{uuid}"
    block-card-by-uuid: "/cards/block/{uuid}"
  invoice-api:
    base-url: "http://localhost:3000/"
    get-invoice-by-uuid: "/invoices/{uuid}"
  tool:
    logging:
      enabled: true