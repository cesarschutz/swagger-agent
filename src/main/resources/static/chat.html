<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Agent - Interface Premium</title>
    <meta name="description" content="Interface de chat avançada para interagir com o Spring AI Agent">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --text-color: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --border-radius: 0.75rem;
            --shadow: 0 4px_12px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--surface-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            gap: 4rem;
        }
        
        .logo-container {
            flex-shrink: 0;
            text-align: center;
        }

        .logo-container img {
            max-width: 250px;
            width: 100%;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 900px;
            background-color: var(--bg-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .header {
            padding: 1rem 1.5rem;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header h3 {
            font-weight: 600;
            color: var(--text-color);
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.bot {
            align-self: flex-start;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 0.75rem;
            flex-shrink: 0;
            align-self: flex-start;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .message-content {
            padding: 0.75rem 1.25rem;
            border-radius: var(--border-radius);
            position: relative;
        }
        
        .message.user .message-content {
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot .message-content {
            background-color: #e9ecef;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-bottom-left-radius: 0.25rem;
        }
        
        .message-time {
            font-size: 0.7rem;
            margin-top: 0.5rem;
            text-align: right;
            opacity: 0.8;
        }
        
        .message.user .message-content .message-time {
             color: rgba(255,255,255,0.8);
        }
        
        .message.bot .message-content .message-time {
            color: var(--text-muted);
        }
        
        .message-content p, .message-content ul, .message-content ol, .message-content h1, .message-content h2, .message-content h3 {
            margin-bottom: 0.5rem;
        }
        .message-content ul, .message-content ol {
            padding-left: 1.2rem;
        }
        .message-content pre {
            background-color: rgba(0,0,0,0.05);
            padding: 0.5rem;
            border-radius: 0.5rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-container {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        .input-form {
            display: flex;
            gap: 0.75rem;
        }

        #messageInput {
            flex-grow: 1;
            padding: 0.75rem 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            transition: var(--transition);
        }
        #messageInput:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 20%, transparent);
        }

        #sendButton {
            width: 50px;
            height: 50px;
            border-radius: var(--border-radius);
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: var(--transition);
        }
        #sendButton:hover {
            background-color: var(--primary-hover);
        }
        #sendButton:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 0.75rem 1.25rem;
            background-color: #e9ecef;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 0.25rem;
            animation: fadeIn 0.3s ease;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing-bounce 1.4s infinite both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0s; }
        
        @keyframes typing-bounce {
            0%, 80%, 100% {
                transform: scale(0);
            } 40% {
                transform: scale(1.0);
            }
        }
        .clear-button {
            position: absolute;
            right: 1rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--border-color) 50%, transparent);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-color);
        }

    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="Company Logo">
    </div>

    <div class="chat-wrapper">
        <div class="header">
            <h3>Chat</h3>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be appended here -->
        </div>
        <div class="input-container">
            <form class="input-form" id="chatForm">
                <textarea id="messageInput" placeholder="Digite sua mensagem..." rows="1" required></textarea>
                <button id="sendButton" type="submit">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chatMessages');
            const messageInput = document.getElementById('messageInput');
            const chatForm = document.getElementById('chatForm');
            const sendButton = document.getElementById('sendButton');
            
            const apiUrl = window.location.origin + '/api/chat';

            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Handle form submission
            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                sendMessage();
            });

            // Send with Enter (but allow new lines with Shift+Enter)
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            function sendMessage() {
                const messageText = messageInput.value.trim();
                if (!messageText) return;
                
                addMessage(messageText, 'user');
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                sendButton.disabled = true;
                showTypingIndicator();
                
                fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                })
                .then(async response => {
                    hideTypingIndicator();
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.content) {
                            addMessage(data.content, 'bot');
                        } else {
                            addMessage('Desculpe, recebi uma resposta inesperada do servidor.', 'bot');
                        }
                    } else if (response.status === 400) {
                        const err = await response.json();
                        const errorMessage = "Ocorreu um erro de validação: " + Object.values(err).join(' ');
                        addMessage(errorMessage, 'bot');
                    } else {
                        const errorText = await response.text();
                        console.error("Server error:", response.status, errorText);
                        addMessage('Desculpe, ocorreu um erro ao processar sua mensagem no servidor.', 'bot');
                    }
                })
                .catch(error => {
                    hideTypingIndicator();
                    console.error('Error:', error);
                    addMessage('Desculpe, ocorreu um erro de comunicação. Verifique sua conexão ou o status do servidor.', 'bot');
                })
                .finally(() => {
                    sendButton.disabled = false;
                    messageInput.focus();
                });
            }

            function addMessage(text, type) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;

                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar';
                
                const avatarImg = document.createElement('img');
                // Use a placeholder for user avatar for alignment
                avatarImg.src = type === 'bot' ? 'icone.png' : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
                avatarImg.alt = `${type} avatar`;
                if(type === 'user') {
                    avatarDiv.style.visibility = 'hidden';
                }

                avatarDiv.appendChild(avatarImg);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                if (type === 'bot') {
                    contentDiv.innerHTML = marked.parse(text);
                } else {
                    const p = document.createElement('p');
                    p.textContent = text;
                    contentDiv.appendChild(p);
                }
                
                contentDiv.appendChild(timeDiv);

                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
                chatMessages.appendChild(messageDiv);

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showTypingIndicator() {
                const indicator = document.createElement('div');
                indicator.id = 'typing-indicator';
                indicator.className = 'message bot';
                indicator.innerHTML = `
                    <div class="avatar">
                        <img src="icone.png" alt="bot avatar">
                    </div>
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                `;
                chatMessages.appendChild(indicator);
                // Make it visible by overriding display property
                indicator.querySelector('.typing-indicator').style.display = 'block';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function hideTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) {
                    indicator.remove();
                }
            }

            // Adiciona mensagem de boas-vindas
            addMessage("Olá! Sou seu assistente de IA. Como posso ajudar hoje?", 'bot');

            // Initial focus
            messageInput.focus();
        });
    </script>
</body>
</html>
